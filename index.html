<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <link rel="stylesheet" href="./src/output.css" />
  <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
  <body class="bg-[#5C4A2A] flex flex-col ">
    <header
      class="bg-[#F5F0E8] flex flex-col items-center justify-between py-2 w-full"
    >
      <h1 class="text-4xl font-bold">
        Velo <span class="text-[#5C4A2A]">Terra</span>
      </h1>
      <h4 class="text-center">
        Easy, Fast, and Reliable.
        <br />
        Connect vendors & consumers effortlessly.
      </h4>
    </header>
    <main class=" h-screen w-full flex flex-col justify-evenly items-center">
      <!-- Customer Section -->
      <section
        class="bg-[#1f401f] rounded-2xl flex flex-col items-center justify-center p-2 shadow-2xl shadow-[#342a18] active:shadow-2xs"
      >
        <h1 class="text-2xl text-[#F5F0E8] font-semibold ">
          JOIN AS A CUSTOMER
        </h1> 
        <div
          class=" bg-[#5C4A2A] rounded-2xl flex flex-row items-center justify-around p-2"
        >
        <div class="flex flex-row ">
          <div class=" w-36">
              <dotlottie-player
                src="shopping.json"
                background="transparent"
                speed="1"
                loop
                autoplay
              ></dotlottie-player>
          </div> 

          <div class=" h-48 w-32 flex flex-col items-center justify-evenly ">
            <div class="">
              <h3 class=" font-semibold">Shop unique products from local vendors.</h3>
            </div>
            <div class=" h-[1.5px] w-full  bg-[#F5F0E8] rounded-xl"></div>
            <div>
              <button
                class="bg-[#F5F0E8] text-[#2E5C2E] font-bold py-2 px-4 rounded-lg"
              >
                 SignUp
              </button>
            </div>
          </div>
          </div>
        </div>
      </section>

      <!-- Vendor Section -->
      <section
        class="bg-[#1f401f] rounded-2xl flex flex-col items-center justify-center p-2 "
      >
        <h1 class="text-2xl text-[#F5F0E8] font-semibold ">
          JOIN AS A VENDOR
        </h1>

        <div
          class=" bg-[#5C4A2A] rounded-2xl flex flex-row items-center justify-around p-2"
        >
        <div class="flex flex-row ">
          <div class=" w-36">
              <dotlottie-player
                src="online.json"
                background="transparent"
                speed="1"
                loop
                autoplay
              ></dotlottie-player>
          </div> 

          <div class=" h-48 w-32 flex flex-col items-center justify-evenly ">
            <div class="">
              <h3 class=" font-semibold">Shop unique products from local vendors.</h3>
            </div>
            <div class=" h-[1.5px] w-full  bg-[#F5F0E8] rounded-xl"></div>
            <div>
              <button
                class="bg-[#F5F0E8] text-[#2E5C2E] font-bold py-2 px-4 rounded-lg"
              >
                 SignUp
              </button>
            </div>
          </div>
          </div>
        </div>
      </section>
      <h1>Already have an account? <a href="#" class="text-[#F5F0E8] underline">SignIn</a></h1>
    </main>
  </body>
</html>
